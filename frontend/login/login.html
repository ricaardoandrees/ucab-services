<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCAB Services — Iniciar Sesión</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="page">

    <div class="card">

      <!-- Cabecera azul de la tarjet -->
      <div class="card__header">
        <div class="card__logo">UC</div>
        <div>
          <p class="card__brand">UCAB Services</p>
          <p class="card__tagline">Portal Institucional</p>
        </div>
      </div>

      <!-- Cuerpo del formulario -->
      <div class="card__body">
        <h1 class="form__title">Iniciar Sesión</h1>
        <p class="form__subtitle">Ingresa con tu cuenta institucional</p>

        <form id="login-form" novalidate>

          <div class="field">
            <label class="field__label" for="correo">Correo Institucional</label>
            <input
              class="field__input"
              type="email"
              id="correo"
              name="correo"
              placeholder="usuario@ucab.edu.ve"
              autocomplete="email"
            />
            <span class="field__error" id="error-correo"></span>
          </div>

          <div class="field">
            <label class="field__label" for="contrasena">Contraseña</label>
            <div class="field__input-wrap">
              <input
                class="field__input"
                type="password"
                id="contrasena"
                name="contrasena"
                placeholder="••••••••"
                autocomplete="current-password"
              />
              <button type="button" class="field__toggle" id="toggle-pass" aria-label="Mostrar contraseña">
                <!-- Ojo SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field__error" id="error-contrasena"></span>
          </div>

          <!-- Mensaje de error general del servidor -->
          <div class="alert alert--error" id="alert-general" role="alert" aria-live="polite"></div>

          <button type="submit" class="btn-primary" id="btn-submit">
            <span class="btn-primary__text">Ingresar</span>
            <span class="btn-primary__loader" id="btn-loader" aria-hidden="true"></span>
          </button>

        </form>

        <div class="card__footer">
          <a href="#" class="link-forgot">¿Olvidaste tu contraseña?</a>
        </div>

      </div>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
